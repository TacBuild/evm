name: Generate Protobuf and Create PR

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to create PR against'
        required: true
        default: 'enter target branch here'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-proto:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch }}
          fetch-depth: 0

      - name: Generate Protobuf files
        run: make proto-gen

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Proto files have changed:"
            git status --porcelain
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in proto files"
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: regenerate protobuf files"
          title: "chore: regenerate protobuf files for ${{ github.event.inputs.target_branch }}"
          body: |
            This PR was automatically generated by the `proto-gen-pr` workflow.
            ## Changes
            - Regenerated protobuf Go files from `.proto` definitions
            ## Target Branch
            `${{ github.event.inputs.target_branch }}`
            ## Triggered by
            @${{ github.actor }}
          branch: proto-gen/${{ github.event.inputs.target_branch }}-${{ github.run_number }}
          base: ${{ github.event.inputs.target_branch }}
          delete-branch: true
          labels: |
            automated
            protobuf

      - name: No changes summary
        if: steps.check_changes.outputs.changes == 'false'
        run: |
          echo "::notice::No protobuf changes detected. PR was not created."
