syntax = "proto3";
package tac.liquidstake.v1beta1; 

import "gogoproto/gogo.proto";
import "cosmos_proto/cosmos.proto";
import "cosmos/base/v1beta1/coin.proto";
import "amino/amino.proto";

option go_package = "github.com/cosmos/evm/x/liquidstake/types";

// StakeAuthorization defines authorization for delegate/undelegate/redelegate.
//
// Since: cosmos-sdk 0.43
message LiquidStakeAuthorization {
  option (cosmos_proto.implements_interface) = "cosmos.authz.v1beta1.Authorization";
  option (amino.name)                        = "liquidstake/LiquidStakeAuthorization";

  // max_tokens specifies the maximum amount of tokens can be delegate to a validator. If it is
  // empty, there is no spend limit and any amount of coins can be delegated.
  cosmos.base.v1beta1.Coin max_tokens = 1 [(gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coin"];
  // validators is the oneof that represents either allow_list or deny_list
  // authorization_type defines one of AuthorizationType.
  AuthorizationType authorization_type = 2;

  //ValidatorAdress in case of StakeToLP
  string Validator = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  //ValidatorAdress in case of StakeToLP
  cosmos.base.v1beta1.Coin min_liquid_tokens = 4 [(gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coin"];
}

// AuthorizationType defines the type of staking module authorization type
//
// Since: cosmos-sdk 0.43
enum AuthorizationType {
  AUTHORIZATION_TYPE_UNSPECIFIED = 0;
  AUTHORIZATION_TYPE_STAKE = 1;
  AUTHORIZATION_TYPE_UNSTAKE = 2;
  AUTHORIZATION_TYPE_STAKE_TO_LP = 3;
}

